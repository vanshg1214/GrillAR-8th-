<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>GrillAR: American Outdoor Grill</title>
  <meta itemprop="name" content="GrillAR: American Outdoor Grill">
  <meta name="description" content="Click to place the American Outdoor Grill in AR.">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>
  <meta name="8thwall:package" content="@8thwall.coaching-overlay"/>
</head>

<body>
  <script src="bundle.js"></script>

  <div class="over">
    <span id="promptText">Tap To Place Grill</span>
  </div>

  <!-- Simplified UI: removed filter tray -->

  <a-scene
    tap-place
    landing-page
    xrextras-loading
    xrextras-runtime-error
    coaching-overlay
    premium-materials="hdr: assets/san_giuseppe_bridge_1k.hdr; exposure: 1.35"
    renderer="colorManagement:true; physicallyCorrectLights: true"
    xrweb="
      allowedDevices: any;
      enableDepth: false;
      scale: absolute;
      disableWorldTracking: false;
      defaultEnvironmentFogIntensity: 0.3; 
      defaultEnvironmentFloorTexture: #groundTex; 
      defaultEnvironmentFloorColor: #FFF;
      defaultEnvironmentSkyBottomColor: #B4C4CC; 
      defaultEnvironmentSkyTopColor: #5ac8fa;
      defaultEnvironmentSkyGradientStrength: 0.5;">

    <a-assets>
      <img id="groundTex" src="assets/sand.jpg">
      <a-asset-item id="grillModel" src="assets/American outdoor grill.glb"></a-asset-item>
      <a-asset-item id="hdr" src="assets/san_giuseppe_bridge_1k.hdr"></a-asset-item>
    </a-assets>

    <a-camera
      id="camera"
      position="0 8 8"
      raycaster="objects: .cantap"
      cursor="
        fuse: false;
        rayOrigin: mouse;">
    </a-camera>

    <!-- Main directional light (sun) -->
    <a-entity
      id="dirlight"
      light="
        type: directional;
        intensity: 1.2;
        color: #FFF8F0;
        castShadow: true;
        shadowMapHeight: 4096;
        shadowMapWidth: 4096;
        shadowCameraTop: 40;
        shadowCameraBottom: -40;
        shadowCameraRight: 40;
        shadowCameraLeft: -40"
      xrextras-attach="target: camera; offset: 8 15 4"
      position="1 4.3 2.5"
      shadow>
    </a-entity>

    <!-- Secondary fill light -->
    <a-entity
      light="
        type: directional;
        intensity: 0.4;
        color: #E0E8FF;
        castShadow: false"
      position="-5 6 -3">
    </a-entity>

    <!-- Floor detection plane - Exactly at 0 0 0 for Simulator compatibility -->
    <a-plane
      id="ground"
      class="cantap"
      rotation="-90 0 0"
      width="1000"
      height="1000"
      position="0 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow>
    </a-plane>
  </a-scene>
</body>
</html>
